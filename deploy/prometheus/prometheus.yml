# 使用Claude Code 接入 MiniMax-2.5 辅助创建

global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'tisminSRETool'
    static_configs:
      - targets: ['tisminSRETool:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s