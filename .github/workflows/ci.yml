name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "develop/**", "feature/**" ]
    tags: [ "v*" ] # 当推送 v0.1.0 等标签时触发镜像构建
  pull_request:
    branches: [ "main", "develop", "develop/**", "feature/**" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Prepare Dependencies
        run: |
          go mod tidy
          go mod vendor # 解决 "no export data for golang.org/x/sys/unix" 的核心步骤

      - name: Static Analysis (Linter)
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          # 告诉 linter 使用本地 vendor 目录，避免重复下载和元数据缺失
          args: --modules-download-mode=vendor --timeout=5m

      - name: Run Tests
        run: go test -v ./...

  build-and-push-image:
    # 只有在代码通过了上面的测试和 Linter，且推送了标签或 develop 分支时，才执行这一步
    needs: test-and-lint
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/tisminsretool

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
